<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ──────────────────────────────────────────────────────────── -->
    <title>Tango — Aprenda japonês com repetição espaçada</title>

    <!-- ── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tango — Aprenda japonês com repetição espaçada" />
    <meta property="og:description" content="Domine hiragana e katakana com repetição espaçada inteligente, seguindo o currículo Genki I/II. Um PWA mobile-first para quem aprende japonês." />

    <meta name="twitter:description" content="Domine hiragana e katakana com repetição espaçada inteligente, seguindo o currículo Genki I/II." />
    <meta name="twitter:image" content="/pwa-512x512.png" />

    <!-- ── Japanese font — prevent FOUT ────────────────────────────────────
         Reads the persisted font choice from localStorage and immediately
         sets --font-ja on <html> before any React code runs. This ensures
         the correct font-family is in the cascade from the very first paint,
         eliminating the flash of the default system font.                   -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('tango-ja-font');
          var families = {
            'noto-sans':     '"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif',
            'klee-one':      '"Klee One",cursive',
            'noto-serif':    '"Noto Serif JP","Yu Mincho",serif',
            'm-plus-rounded':'"M PLUS Rounded 1c",sans-serif'
          };
          if (stored && families[stored]) {
            document.documentElement.style.setProperty('--font-ja', families[stored]);
          }
        } catch (e) { /* localStorage blocked — silently use CSS default */ }
      })();
    </script>

    <!-- ── Color theme — prevent flash of wrong theme ──────────────────────
         Reads the persisted theme choice from localStorage and immediately
         sets every theme CSS custom property on <html> before any React code
         runs, matching the FOUT-prevention technique above. Keep this table
         in sync with THEME_OPTIONS in src/lib/themes.ts by hand — there is
         no automated check (see docs/CODE_PRACTICES.md).                    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('tango-theme');
          var themes = {
            midnight: {
              background: '216 18% 16%', foreground: '0 0% 93%',
              card: '217 10% 25%', 'card-foreground': '0 0% 93%',
              'card-bg': '217 10% 25%', 'card-bg-foreground': '0 0% 93%',
              popover: '217 10% 25%', 'popover-foreground': '0 0% 93%',
              primary: '183 100% 45%', 'primary-foreground': '216 18% 14%',
              secondary: '217 8% 22%', 'secondary-foreground': '0 0% 93%',
              accent: '183 35% 24%', 'accent-foreground': '183 70% 82%',
              muted: '217 10% 22%', 'muted-foreground': '216 10% 65%',
              border: '217 10% 30%', input: '217 10% 30%', ring: '183 100% 45%',
              'chart-1': '183 100% 45%', 'chart-2': '0 0% 93%',
              'chart-3': '217 15% 55%', 'chart-4': '183 50% 30%', 'chart-5': '217 10% 40%'
            },
            sakura: {
              background: '0 55% 95%', foreground: '244 15% 20%',
              card: '0 45% 97%', 'card-foreground': '244 15% 20%',
              'card-bg': '0 45% 96%', 'card-bg-foreground': '244 15% 20%',
              popover: '0 45% 97%', 'popover-foreground': '244 15% 20%',
              primary: '244 20% 42%', 'primary-foreground': '0 0% 100%',
              secondary: '0 30% 93%', 'secondary-foreground': '244 15% 20%',
              accent: '0 90% 90%', 'accent-foreground': '0 55% 35%',
              muted: '0 20% 92%', 'muted-foreground': '244 10% 45%',
              border: '0 30% 88%', input: '0 30% 88%', ring: '244 20% 42%',
              'chart-1': '244 20% 42%', 'chart-2': '244 15% 20%',
              'chart-3': '0 90% 85%', 'chart-4': '0 60% 90%', 'chart-5': '0 20% 92%'
            },
            torii: {
              background: '30 15% 95%', foreground: '0 0% 9%',
              card: '30 12% 92%', 'card-foreground': '0 0% 9%',
              'card-bg': '30 12% 92%', 'card-bg-foreground': '0 0% 9%',
              popover: '30 15% 95%', 'popover-foreground': '0 0% 9%',
              primary: '343 66% 48%', 'primary-foreground': '0 0% 100%',
              secondary: '30 8% 90%', 'secondary-foreground': '0 0% 9%',
              accent: '343 55% 93%', 'accent-foreground': '343 66% 30%',
              muted: '30 6% 89%', 'muted-foreground': '30 5% 40%',
              border: '30 10% 85%', input: '30 10% 85%', ring: '343 66% 48%',
              'chart-1': '343 66% 48%', 'chart-2': '0 0% 9%',
              'chart-3': '30 10% 85%', 'chart-4': '30 12% 92%', 'chart-5': '30 6% 89%'
            }
          };
          // 'default' is intentionally absent — it matches the CSS-authored
          // :root values already in src/index.css, so there's nothing to
          // override and no flash to prevent.
          if (stored && themes[stored]) {
            var tokens = themes[stored];
            var root = document.documentElement.style;
            for (var key in tokens) {
              if (Object.prototype.hasOwnProperty.call(tokens, key)) {
                root.setProperty('--' + key, tokens[key]);
              }
            }
          }
        } catch (e) { /* localStorage blocked — silently use CSS default */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
